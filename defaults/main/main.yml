---
###############################################################################
# 7 Days to Die
###############################################################################

# 1. Force Seven Days to Die server updates if already installed?
#
# Server will be updated during role application and as a pre-start task for
# service start. Disable to prevent updates after initial installation.
#
# Default: False.
seven_days_to_die_flg_update: false

# 3. Enable scheduled server backup?
seven_days_to_die_flg_backup: false

###############################################################################
# Service
###############################################################################

# Additional steamcmd options to use during app_update.
#
# Use 'validate' to checksum installed files for corruption.
#
# Default: [].
seven_days_to_die_srv_update_opts: []

###############################################################################
# Config
###############################################################################

# serverconfig.xml to set.
#
# Ansible controller path to source serverconfig.xml (treated as a jinja2
# template allowing for ansible variable interpretation). Overwrites existing
# /home/steam/seven_days_to_die/serverconfig.xml.
#
# A default config that works with the role will be deployed if no config file
# is specified (see templates/default/serverconfig.xml):
#
# Role contains two example configurations:
# * templates/default - Vanilla auto-generated server settings.
# * templates/secured - Vanilla with telnet disabled (recommended).
#
# seven_days_to_die_cfg_server_config:
#   'host_vars/sat.example.com/data/serverconfig.xml'
#
# Default: '' (use auto-generated defaults on startup).
#
# Reference:
# * https://r-pufky.github.io/docs/games/seven_days_to_die
# * https://developer.valvesoftware.com/wiki/7_Days_to_Die_Dedicated_Server
seven_days_to_die_cfg_server_config: ''

# serveradmin.xml to set.
#
# Ansible controller path to source serveradmin.xml (treated as a jinja2
# template allowing for ansible variable interpretation). Overwrites existing
# /home/steam/seven_days_to_die/serveradmin.xml.
#
# A default config that works with the role will be deployed if no config file
# is specified (see templates/default/serveradmin.xml):
#
# Role contains two example configurations:
# * templates/default - Vanilla auto-generated server settings.
# * templates/secured - Vanilla with telnet disabled (recommended).
#
# seven_days_to_die_cfg_server_admin:
#   'host_vars/sat.example.com/data/serveradmin.xml'
#
# Default: '' (use auto-generated defaults on startup).
#
# Reference:
# * https://r-pufky.github.io/docs/games/seven_days_to_die
# * https://developer.valvesoftware.com/wiki/7_Days_to_Die_Dedicated_Server
seven_days_to_die_cfg_server_admin: ''

# Backup
###############################################################################

# Root backup location. Default: '/srv/backup/seven_days_to_die'.
seven_days_to_die_cfg_backup_d: '/srv/backup/seven_days_to_die'

# Enable hot backups?
#
# Hot backups DO NOT stop server before creating backup. For busy servers This
# WILL lead to data corruption.
#
# Default: False.
seven_days_to_die_cfg_backup_hot: false

# Backup schedule (systemd TIME format). Default: '1d' (daily).
seven_days_to_die_cfg_backup_schedule: '1d'
